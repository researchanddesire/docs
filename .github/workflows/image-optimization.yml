name: Optimize Images

on:
  # Runs on "push" event for the "main" branch but only if there are changes to image files.
  push:
    branches:
      - main

  # Runs once per day at midnight UTC
  schedule:
    - cron: "0 0 * * *"

  # Allows manual workflow trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  optimize:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: Documentation/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: Documentation
        run: pnpm install

      - name: Run optimize
        working-directory: Documentation
        run: pnpm optimize

      - name: Commit and push changes
        run: |
          git add -A
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions[bot]"
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -am "Optimize images: convert to WebP"
            git push
          fi