name: Pull OSSM Docs from Public

on:
  push:
    branches: main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
    contents: write

jobs:
  aggregate-docs:
    runs-on: ubuntu-latest
    name: Aggregate mintlify docs
    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RAD_VERSION_CONTROL_APP_ID }}
          private-key: ${{ secrets.RAD_VERSION_CONTROL_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}

      - name: Check last commit message
        id: check_commit
        run: |
          LAST_COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$LAST_COMMIT_MSG" | grep -qi "Mintlify"; then
            echo "Last commit contains 'Mintlify', skipping workflow to prevent infinite loops"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run OSSM docs merge script
        if: steps.check_commit.outputs.skip != 'true'
        run: ./scripts/clone-ossm-docs.sh

      - name: Push changes to main
        if: steps.check_commit.outputs.skip != 'true'
        run: |
          git config user.name "rad-version-control[bot]"
          git config user.email "rad-version-control[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync OSSM documentation"
            git push origin main
          fi
