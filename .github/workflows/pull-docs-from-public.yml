name: Pull Docs from Public Repos

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      repo:
        description: 'Specific repo to pull (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - 'ossm'
          - 'radr'
          - 'dtt'
          - 'lkbx'
          - 'dashboard'
  repository_dispatch:

permissions:
  contents: write

jobs:
  aggregate-docs:
    runs-on: ubuntu-latest
    name: Aggregate docs from public repos
    steps:
      # Token for this repo (to push changes)
      - name: Generate token for this repo
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RAD_VERSION_CONTROL_APP_ID }}
          private-key: ${{ secrets.RAD_VERSION_CONTROL_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      # Token for DT_Trainer repo (to pull docs)
      - name: Generate token for DT_Trainer
        id: token_dtt
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RAD_VERSION_CONTROL_APP_ID }}
          private-key: ${{ secrets.RAD_VERSION_CONTROL_PRIVATE_KEY }}
          owner: ResearchAndDesire
          repositories: DT_Trainer

      # Token for Lockbox repo (to pull docs)
      - name: Generate token for Lockbox
        id: token_lkbx
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RAD_VERSION_CONTROL_APP_ID }}
          private-key: ${{ secrets.RAD_VERSION_CONTROL_PRIVATE_KEY }}
          owner: ResearchAndDesire
          repositories: Lockbox

      # Token for rad-app repo (to pull docs)
      - name: Generate token for rad-app
        id: token_dashboard
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RAD_VERSION_CONTROL_APP_ID }}
          private-key: ${{ secrets.RAD_VERSION_CONTROL_PRIVATE_KEY }}
          owner: ResearchAndDesire
          repositories: rad-app

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}

      - name: Check last commit message
        id: check_commit
        run: |
          LAST_COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$LAST_COMMIT_MSG" | grep -qi "sync.*documentation"; then
            echo "Last commit is a doc sync, skipping to prevent infinite loops"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Make sync script executable
        if: steps.check_commit.outputs.skip != 'true'
        run: chmod +x ./scripts/sync-docs.sh

      # Sync OSSM docs from KinkyMakers/OSSM-hardware
      - name: Sync OSSM docs
        if: steps.check_commit.outputs.skip != 'true' && (inputs.repo == '' || inputs.repo == 'ossm')
        run: |
          ./scripts/sync-docs.sh \
            "KinkyMakers" \
            "OSSM-hardware" \
            "aj/mintlify-docs" \
            "Documentation/ossm" \
            "Documentation/ossm" \
            "Open Source Sex Machine"

      # Sync rad-remote docs from ResearchAndDesire/rad-remote
      - name: Sync rad-remote docs
        if: steps.check_commit.outputs.skip != 'true' && (inputs.repo == '' || inputs.repo == 'radr')
        run: |
          ./scripts/sync-docs.sh \
            "ResearchAndDesire" \
            "rad-remote" \
            "main" \
            "Documentation/radr" \
            "Documentation/radr" \
            "Wireless Remote"

      # Sync DT_Trainer docs from ResearchAndDesire/DT_Trainer
      - name: Sync DT_Trainer docs
        if: steps.check_commit.outputs.skip != 'true' && (inputs.repo == '' || inputs.repo == 'dtt')
        env:
          GITHUB_TOKEN: ${{ steps.token_dtt.outputs.token }}
        run: |
          ./scripts/sync-docs.sh \
            "ResearchAndDesire" \
            "DT_Trainer" \
            "main" \
            "Documentation/dtt" \
            "Documentation/dtt" \
            "Deepthroat Trainer"

      # Sync Lockbox docs from ResearchAndDesire/Lockbox
      - name: Sync Lockbox docs
        if: steps.check_commit.outputs.skip != 'true' && (inputs.repo == '' || inputs.repo == 'lkbx')
        env:
          GITHUB_TOKEN: ${{ steps.token_lkbx.outputs.token }}
        run: |
          ./scripts/sync-docs.sh \
            "ResearchAndDesire" \
            "Lockbox" \
            "main" \
            "Documentation/lkbx" \
            "Documentation/lkbx" \
            "Chastity Lockbox"

      # Sync Dashboard docs from ResearchAndDesire/rad-app
      - name: Sync Dashboard docs
        if: steps.check_commit.outputs.skip != 'true' && (inputs.repo == '' || inputs.repo == 'dashboard')
        env:
          GITHUB_TOKEN: ${{ steps.token_dashboard.outputs.token }}
        run: |
          ./scripts/sync-docs.sh \
            "ResearchAndDesire" \
            "rad-app" \
            "main" \
            "Documentation/dashboard" \
            "Documentation/dashboard" \
            "Dashboard"

      - name: Push changes to main
        if: steps.check_commit.outputs.skip != 'true'
        run: |
          git config user.name "rad-version-control[bot]"
          git config user.email "rad-version-control[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync documentation from public repos"
            git push origin main
          fi
