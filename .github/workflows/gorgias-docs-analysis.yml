name: Gorgias Docs Analysis

on:
  schedule:
    # Run once per day at 6 AM UTC
    - cron: '50 * * * *'
  workflow_dispatch:
    # Allow manual triggers

permissions:
  contents: write
  pull-requests: write

jobs:
  analyze-tickets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: aj/gorgias
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "Gorgias Docs Bot"
          git config user.email "gorgias-bot@researchanddesire.com"

      - name: Merge main into aj/gorgias
        run: |
          git fetch origin main
          git merge origin/main --no-edit || {
            echo "Merge conflict detected. Aborting."
            git merge --abort
            exit 1
          }

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: Documentation/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: Documentation
        run: pnpm install

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: Run Gorgias tickets analysis
        working-directory: Documentation
        env:
          GORGIAS_API_KEY: ${{ secrets.GORGIAS_API_KEY }}
          GORGIAS_EMAIL: ${{ secrets.GORGIAS_EMAIL }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          pnpm ossm gorgias-tickets --max-pages 1 --analyze

      - name: Push changes
        run: |
          git push origin aj/gorgias

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head aj/gorgias --base main --json number --jq '.[0].number')
          
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, it will be updated with the new commits."
          else
            # Check if there are differences between aj/gorgias and main
            if git diff origin/main...HEAD --quiet; then
              echo "No differences between aj/gorgias and main. Skipping PR creation."
            else
              gh pr create \
                --title "docs: Gorgias ticket documentation updates" \
                --body $'## Summary\nAutomated documentation updates based on Gorgias support ticket analysis.\n\nThis PR contains documentation improvements identified from customer support conversations.\n\n## Generated by\nGorgias Docs Analysis workflow' \
                --base main \
                --head aj/gorgias
            fi
          fi

